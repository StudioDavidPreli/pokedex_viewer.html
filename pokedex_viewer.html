<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>pokédex viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      background:#262626;
      min-height:100vh;
      overflow:hidden;
      display:flex; flex-direction:column;
      align-items:center; justify-content:flex-start;
      padding: 0px;
      font-family:'IBM Plex Mono', monospace; color:#aaa;
    }
    #wrap {
      display:flex; flex-direction:column;
      align-items:center; gap:1.3vw;
      padding: 1.4vw 0px 0px;
      width:100%; max-width:700px;
    }
    #controls {
      display:flex; gap:1vw; align-items:center;
      width:100%; flex-wrap:wrap; justify-content:center;
    }
    input[type=date], input[type=time] {
      background:#141414; border:0px solid #1a1a2e;
      color:#76c17d; font-family:'IBM Plex Mono', monospace; font-size:1.4vw;
      padding:0.6vw 1vw; border-radius:0px; letter-spacing:1px;
      outline:none; cursor:pointer;
    }
    input[type=date]:focus, input[type=time]:focus {
      border-color:#4ecca3;
    }
    h1    { color:#76c17d; font-size:2vw; letter-spacing:3px; text-transform:uppercase; }
    #subtitle { font-size:1.4vw; color:#efefef91; letter-spacing:1px; }
    #clock    { font-size:1.4vw; color:#efefef74; letter-spacing:1px; font-variant-numeric:tabular-nums; }
    #canvasWrap {
      width: min(500px, calc(100vw - 8vw));
      aspect-ratio: 1 / 1;
      position: relative;
    }
    #identity {
      display: flex;
      gap: 1vw;
      align-items: baseline;
      width: min(500px, calc(100vw - 8vw));
      flex-wrap: wrap;
      justify-content: center;
    }
    #canvasWrap canvas {
      width:100% !important; height:100% !important;
      border-radius:0px; cursor:crosshair; display:block;
    }
    #status {
      font-size:1.4vw; color:#e1e1e191; letter-spacing:1px; min-height:1.4vw;
      width: min(500px, calc(100vw - 8vw));
      text-align: center;
      word-wrap: break-word;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="controls">
      <input type="date" id="pickerDate">
      <input type="time" id="pickerTime" step="1">
    </div>  
    <div id="identity">
    <h1 id="title">———</h1>
    <span id="subtitle"></span>
    </div>
    <div id="status"></div>
    <div id="canvasWrap"></div>
  </div>

    [136,"flareon","fire",null],[137,"porygon","normal",null],[138,"omanyte","rock","water"],
    [139,"omastar","rock","water"],[140,"kabuto","rock","water"],[141,"kabutops","rock","water"],
    [142,"aerodactyl","rock","flying"],[143,"snorlax","normal",null],[144,"articuno","ice","flying"],
    [145,"zapdos","electric","flying"],[146,"moltres","fire","flying"],[147,"dratini","dragon",null],
    [148,"dragonair","dragon",null],[149,"dragonite","dragon","flying"],[150,"mewtwo","psychic",null],
    [151,"mew","psychic",null]
  ];

  var START_MS = new Date(2026,1,27).getTime();
  function dateToPokemon(d){
    var dayOffset = Math.floor((d.getTime() - START_MS) / 86400000);
    dayOffset = Math.max(0, Math.min(365, dayOffset));
    var num = Math.min(151, Math.floor(dayOffset * 150 / 365) + 1);
    return POKEDEX[num - 1];
  }

  var _mockDate = null;
  function _now(){ return _mockDate || new Date(); }

  function pad(n){ return String(n).padStart(2,"0"); }
  function dateToInputs(d){
    var yr=d.getFullYear(), mo=pad(d.getMonth()+1), dy=pad(d.getDate());
    var hh=pad(d.getHours()), mm=pad(d.getMinutes()), ss=pad(d.getSeconds());
    document.getElementById("pickerDate").value = yr+"-"+mo+"-"+dy;
    document.getElementById("pickerTime").value = hh+":"+mm+":"+ss;
  }
  function inputsToDate(){
    var dv = document.getElementById("pickerDate").value;
    var tv = document.getElementById("pickerTime").value || "00:00:00";
    return new Date(dv + "T" + tv);
  }

  function tickClock(){
    if(_mockDate) return;
    var now = new Date();
    var h=now.getHours(), m=now.getMinutes(), s=now.getSeconds();
    var ampm=h<12?"am":"pm", h12=h%12||12;
    var months=["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
    var el=document.getElementById("clock");
    if(el) el.textContent=months[now.getMonth()]+" "+now.getDate()+" "+now.getFullYear()
                          +" · "+h12+":"+pad(m)+":"+pad(s)+" "+ampm;
    dateToInputs(now);
    var expected = dateToPokemon(now);
    if(expected[0] !== currentNum) loadPokemon(now);
  }
  setInterval(tickClock, 1000);

  var SIZE=500, MARGIN=60, SVG_SIZE=SIZE-MARGIN*2;
  var svgCX=SIZE/2, svgCY=SIZE/2, svgScale=1.0;
  var svgImg = new Image();
  var currentNum = -1;
  var currentName = "";
  var TYPE1_NAME="normal", TYPE2_NAME="normal";
  var POKEDEX_NUM=1, POKEDEX_HUE=0;
  var TYPE_HUES={
    normal:[30,40,50],fire:[10,25,40],water:[195,210,225],electric:[50,60,70],
    grass:[90,110,130],ice:[185,200,215],fighting:[5,15,25],poison:[270,290,310],
    ground:[25,35,45],flying:[195,210,230],psychic:[320,340,355],bug:[70,85,100],
    rock:[30,40,50],ghost:[260,275,290],dragon:[230,250,270]
  };

  var params={leafMult:1.0,leafSize:1.0,winterMult:1.0,topo:0.55,topoContrast:1.0,topoScale:0.35};
  function randomizeParams(){
    params.leafMult    =lerp(0.25,6.0,Math.random());
    params.leafSize    =lerp(0.40,2.5,Math.random());
    params.winterMult  =lerp(0.0, 6.0,Math.random());
    params.topo        =lerp(0.0, 1.0,Math.random());
    params.topoContrast=lerp(0.5, 5.0,Math.random());
    params.topoScale   =lerp(0.0, 1.0,Math.random());
  }
  function getSliders(){ return params; }

  function easeOutSine(t)   { return Math.sin(t*Math.PI*0.5); }
  function easeOutCubic(t)  { return 1-Math.pow(1-t,3); }
  function easeOutQuart(t)  { return 1-Math.pow(1-t,4); }
  function easeOutExpo(t)   { return t>=1?1:1-Math.pow(2,-10*t); }
  function easeInOutSine(t) { return -(Math.cos(Math.PI*t)-1)*0.5; }
  function lerp(a,b,t)      { return a+(b-a)*t; }
  function clamp(v,lo,hi)   { return Math.max(lo,Math.min(hi,v)); }
  function hmod(h)           { return((h%360)+360)%360; }
  function sleep(ms)         { return new Promise(function(r){setTimeout(r,ms);}); }
  function mulberry32(s){return function(){s|=0;s=s+0x6D2B79F5|0;var t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  function hashName(n){var h=5381;for(var i=0;i<n.length;i++)h=(Math.imul(h,33)^n.charCodeAt(i))>>>0;return h;}
  function dotLine(x1,y1,x2,y2,density){
    var dx=x2-x1,dy=y2-y1,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<0.5){point(x1,y1);return;}
    var n=Math.max(1,Math.ceil(dist*density));
    for(var i=0;i<n;i++){var t=Math.random();point(x1+dx*t+(Math.random()-0.5)*0.8,y1+dy*t+(Math.random()-0.5)*0.8);}
  }
  function typeHueSample(t,rng){var h=TYPE_HUES[t]||[0,0,0];return lerp(h[0],h[2],rng());}
  function blendTypeHue(tb,rng){return lerp(typeHueSample(TYPE1_NAME,rng),typeHueSample(TYPE2_NAME,rng),tb);}

  // ── Seeded draw wrapper ───────────────────────────────
  // Leaf/winter functions use Math.random() internally for stipple.
  // Swapping it for a deterministic seed before each draw call
  // keeps the stipple pattern stable across frames — only angle changes.
  var _origRandom = Math.random;
  function _seededDraw(seed, fn) {
    var _rng = mulberry32(Math.floor(seed * 1000000) ^ 0xdeadbeef);
    Math.random = _rng;
    fn();
    Math.random = _origRandom;
  }


  var TOPO_RES=3, topoMap=null, topoW, topoH;
  var topoGradX=null, topoGradY=null;
  var topoNoiseScale;

  function buildTopoMap(rng, scaleParam) {
    topoW=Math.ceil(SIZE/TOPO_RES); topoH=Math.ceil(SIZE/TOPO_RES);
    topoMap=new Float32Array(topoW*topoH);
    var offX=rng()*800, offY=rng()*800;
    topoNoiseScale=lerp(0.002,0.018,scaleParam);
    for(var ty=0;ty<topoH;ty++){
      for(var tx=0;tx<topoW;tx++){
        var wx=tx*TOPO_RES*topoNoiseScale+offX, wy=ty*TOPO_RES*topoNoiseScale+offY;
        topoMap[ty*topoW+tx]=noise(wx,wy)*0.58+noise(wx*2.1,wy*2.1)*0.28+noise(wx*4.4,wy*4.4)*0.14;
      }
    }
  }

  function buildTopoGradient() {
    topoGradX=new Float32Array(topoW*topoH);
    topoGradY=new Float32Array(topoW*topoH);
    for(var ty=1;ty<topoH-1;ty++){
      for(var tx=1;tx<topoW-1;tx++){
        var i=ty*topoW+tx;
        topoGradX[i]=topoMap[ty*topoW+(tx+1)]-topoMap[ty*topoW+(tx-1)];
        topoGradY[i]=topoMap[(ty+1)*topoW+tx]-topoMap[(ty-1)*topoW+tx];
      }
    }
  }

  function getRawTopo(x,y){
    var tx=clamp(Math.floor(x/TOPO_RES),0,topoW-1);
    var ty=clamp(Math.floor(y/TOPO_RES),0,topoH-1);
    return topoMap[ty*topoW+tx];
  }
  function getTopoAt(x,y,contrast){
    return clamp((getRawTopo(x,y)-0.5)*contrast+0.5,0,1);
  }
  // Direction along contour = perpendicular to gradient
  function getContourFlow(x,y){
    var tx=clamp(Math.floor(x/TOPO_RES),0,topoW-1);
    var ty=clamp(Math.floor(y/TOPO_RES),0,topoH-1);
    var gx=topoGradX[ty*topoW+tx], gy=topoGradY[ty*topoW+tx];
    var len=Math.sqrt(gx*gx+gy*gy)+0.0001;
    return {vx:-gy/len, vy:gx/len};
  }

  async function drawTopoBackground(rng,d,tb,ahs,topoStrength,topoContrast){
    var numLines=Math.floor(SIZE*lerp(0.55,0.90,rng()));
    var baseDots=lerp(0.06,0.18,rng());
    var bgOutHueA=hmod(blendTypeHue(tb,rng)+ahs+(rng()-0.5)*18);
    var bgOutHueB=hmod(blendTypeHue(tb,rng)+ahs+(rng()-0.5)*18);
    var bgOutSatA=lerp(10,30,d),bgOutSatB=lerp(8,24,d);
    var bgOutBriA=lerp(6,18,d), bgOutBriB=lerp(10,24,d);
    var bgInHueA=hmod(blendTypeHue(tb,rng)+ahs+POKEDEX_HUE*0.10+d*15);
    var bgInHueB=hmod(bgInHueA+lerp(8,20,rng()));
    var bgInSatA=lerp(14,40,d),bgInSatB=lerp(10,32,d);
    var bgInBriA=lerp(9,24,d), bgInBriB=lerp(14,30,d);
    // store for flow mark init
    _bgHueOut=[bgOutHueA,bgOutHueB]; _bgHueIn=[bgInHueA,bgInHueB];
    _bgSatOut=bgOutSatA; _bgBriOut=bgOutBriA;
    _bgSatIn=bgInSatA;   _bgBriIn=bgInBriA;
    var contourLevels=[0.28,0.36,0.44,0.52,0.60,0.68,0.76];
    for(var li=0;li<numLines;li++){
      var y=(li/(numLines-1))*SIZE, lineT=li/(numLines-1);
      var numDots=Math.floor(SIZE*baseDots);
      for(var di=0;di<numDots;di++){
        var x=Math.random()*SIZE;
        var py=Math.floor(clamp(y,0,SIZE-1)), px=Math.floor(x);
        var inside=occupied&&occupied[py*SIZE+px]===1;
        var topo=getTopoAt(x,y,topoContrast);
        var densThresh=lerp(0.5,lerp(0.15,0.92,topo),topoStrength);
        if(Math.random()>densThresh) continue;
        var topoBriMod=lerp(0,lerp(-10,14,topo),topoStrength);
        var h,s,b;
        if(inside){h=lerp(bgInHueA,bgInHueB,lineT)+(Math.random()-0.5)*8;s=lerp(bgInSatA,bgInSatB,lineT)+(Math.random()-0.5)*6;b=clamp(lerp(bgInBriA,bgInBriB,lineT)+topoBriMod+(Math.random()-0.5)*4,0,100);}
        else{h=lerp(bgOutHueA,bgOutHueB,lineT)+(Math.random()-0.5)*8;s=lerp(bgOutSatA,bgOutSatB,lineT)+(Math.random()-0.5)*6;b=clamp(lerp(bgOutBriA,bgOutBriB,lineT)+topoBriMod+(Math.random()-0.5)*4,0,100);}
        strokeWeight(lerp(0.8,1.6,Math.random()));
        stroke(hmod(h),clamp(s,0,100),b,88);
        point(x+(Math.random()-0.5)*1.2,y+(Math.random()-0.5)*3.5);
      }
      if(topoStrength>0.05){
        for(var ci=0;ci<contourLevels.length;ci++){
          var lv=contourLevels[ci];
          for(var cx2=4;cx2<SIZE-4;cx2+=8){
            var t1=getTopoAt(cx2-4,y,topoContrast), t2=getTopoAt(cx2+4,y,topoContrast);
            if((t1-lv)*(t2-lv)<0){
              var ins2=occupied&&occupied[Math.floor(clamp(y,0,SIZE-1))*SIZE+cx2]===1;
              var cBri=ins2?lerp(bgInBriA,bgInBriB,li/numLines)+lerp(4,18,lv):lerp(bgOutBriA,bgOutBriB,li/numLines)+lerp(2,10,lv);
              var cHue=ins2?hmod(bgInHueA+(Math.random()-0.5)*6):hmod(bgOutHueA+(Math.random()-0.5)*6);
              var cSat=ins2?lerp(bgInSatA,bgInSatB,li/numLines):lerp(bgOutSatA,bgOutSatB,li/numLines);
              strokeWeight(lerp(0.5,1.0,Math.random()));
              stroke(cHue,clamp(cSat,0,100),clamp(cBri,0,100),lerp(0,52,topoStrength)*(0.5+Math.random()*0.5));
              point(cx2+(Math.random()-0.5)*2.5,y+(Math.random()-0.5)*2.5);
            }
          }
        }
      }
      if(li%16===0) await sleep(1);
    }
  }

  // Flow marks — drift along contour lines on top of static bg, under leaves
  var flowMarks=[], _fireflyActive=0, _regularActive=0;

  // ── Bug population schedule ───────────────────────────
  var BUG_MAX   = 600;
  var BUG_FLOOR = 27;
  var FF_NOON   = 0.15;
  var FF_CREP   = 0.54;
  var FF_MID    = 0.92;

  function bugDrift(h){ return Math.max(0, Math.sin(Math.PI*h/24)*0.92); }
  function crepWeight(h){
    var dawn=Math.exp(-0.5*Math.pow((h-6)/1.4,2));
    var dusk=Math.exp(-0.5*Math.pow((h-18)/1.4,2));
    return Math.min(1,Math.max(dawn,dusk));
  }
  function fireflyFraction(h){
    var d=bugDrift(h), c=crepWeight(h);
    return clamp(lerp(lerp(FF_MID,FF_NOON,d),FF_CREP,c),0,1);
  }
  function getBugCounts(h){
    var total=Math.max(BUG_FLOOR,Math.round(BUG_MAX*bugDrift(h)));
    var ff=Math.round(total*fireflyFraction(h));
    return{total:total,ff:ff,reg:total-ff};
  }
  function _applyBugGate(counts){
    var ffSlots=Math.floor(BUG_MAX*0.60);
    for(var i=0;i<BUG_MAX;i++){
      var fm=flowMarks[i];
      if(fm.isFirefly){ fm.active=i<counts.ff; }
      else{ fm.active=(i-ffSlots)<counts.reg; }
    }
  }
  var _bgHueOut=[0,0],_bgHueIn=[0,0],_bgSatOut=0,_bgBriOut=0,_bgSatIn=0,_bgBriIn=0;

  function initFlowMarks(drift){
    flowMarks=[];
    var counts=getBugCounts(getHours());
    _fireflyActive=counts.ff; _regularActive=counts.reg;
    for(var i=0;i<BUG_MAX;i++){
      var x=_origRandom()*SIZE, y=_origRandom()*SIZE;
      var ins=occupied&&occupied[Math.floor(y)*SIZE+Math.floor(x)]===1;
      var hArr=ins?_bgHueIn:_bgHueOut;
      var sat=ins?_bgSatIn:_bgSatOut, bri=ins?_bgBriIn:_bgBriOut;
      var isFF=(i<BUG_MAX*0.60);
      var shape=isFF?'firefly':FLY_SHAPES[Math.floor(_origRandom()*FLY_SHAPES.length)];
      flowMarks.push({
        x:x, y:y, isFirefly:isFF, shape:shape,
        spd:       lerp(isFF?0.12:0.20, isFF?0.40:0.60, _origRandom()),
        hue:       lerp(hArr[0],hArr[1],_origRandom()),
        sat:       clamp(sat*lerp(0.9,1.5,_origRandom()),0,100),
        bri:       clamp(bri*lerp(1.2,2.8,_origRandom()),0,100),
        alpBase:   isFF?lerp(18,40,_origRandom()):lerp(28,55,_origRandom()),
        alpRange:  isFF?lerp(25,58,_origRandom()):lerp(10,28,_origRandom()),
        szBase:    isFF?lerp(2.8,6.0,_origRandom()):lerp(1.0,2.2,_origRandom()),
        szRange:   isFF?lerp(1.2,3.2,_origRandom()):lerp(0.2,0.8,_origRandom()),
        ns:        _origRandom()*600,
        nsFlicker: _origRandom()*400,
        flickerSpd:isFF?lerp(0.014,0.048,_origRandom()):lerp(0.035,0.090,_origRandom()),

  // ── Regular fly shapes ───────────────────────────────
  // All orientation-aware: ang = direction of travel
  function drawFly_dash(x,y,ang,sz,hue,sat,bri,alp){
    // Motion blur dash — short stroke in travel direction
    strokeWeight(sz*0.7);
    stroke(hmod(hue),sat,bri,alp);
    var len=sz*2.2;
    point(x,y);
    strokeWeight(sz*0.45);
    stroke(hmod(hue),sat,bri,alp*0.5);
    point(x-Math.cos(ang)*len*0.4, y-Math.sin(ang)*len*0.4);
    point(x-Math.cos(ang)*len*0.8, y-Math.sin(ang)*len*0.8);
  }
  function drawFly_mote(x,y,ang,sz,hue,sat,bri,alp){
    // Tight 3-dot cluster — reads as small insect body
    strokeWeight(sz*0.9);
    stroke(hmod(hue),sat,bri,alp);
    point(x,y);
    strokeWeight(sz*0.55);
    stroke(hmod(hue),sat,bri,alp*0.6);
    point(x+Math.cos(ang+Math.PI*0.5)*sz*0.55, y+Math.sin(ang+Math.PI*0.5)*sz*0.55);
    point(x-Math.cos(ang+Math.PI*0.5)*sz*0.55, y-Math.sin(ang+Math.PI*0.5)*sz*0.55);
  }
  function drawFly_spark(x,y,ang,sz,hue,sat,bri,alp){
    // Crossed glint — two short lines at 45°
    strokeWeight(sz*0.55);
    stroke(hmod(hue),sat,bri,alp);
    var r=sz*1.1;
    point(x+Math.cos(ang)*r,       y+Math.sin(ang)*r);
    point(x-Math.cos(ang)*r,       y-Math.sin(ang)*r);
    point(x+Math.cos(ang+Math.PI*0.5)*r*0.7, y+Math.sin(ang+Math.PI*0.5)*r*0.7);
    point(x-Math.cos(ang+Math.PI*0.5)*r*0.7, y-Math.sin(ang+Math.PI*0.5)*r*0.7);
  }
  function drawFly_curl(x,y,ang,sz,hue,sat,bri,alp){
    // 5-point arc suggesting a beetle in profile
    strokeWeight(sz*0.65);
    stroke(hmod(hue),sat,bri,alp);
    var steps=5;
    for(var i=0;i<steps;i++){
      var t=i/(steps-1), a=ang-0.6+t*1.2, r=sz*(0.7+t*0.4);
      point(x+Math.cos(a)*r, y+Math.sin(a)*r);
    }
  }
  function drawFly_dot(x,y,ang,sz,hue,sat,bri,alp){
    strokeWeight(sz*1.1);
    stroke(hmod(hue),sat,bri,alp);
    point(x,y);
  }

  var FLY_SHAPES=['dash','mote','spark','curl','dot'];

  function drawRegularFly(fm, curAlp, curSz, ang){
    switch(fm.shape){
      case 'dash':  drawFly_dash (fm.x,fm.y,ang,curSz,fm.hue,fm.sat,fm.bri,curAlp); break;
      case 'mote':  drawFly_mote (fm.x,fm.y,ang,curSz,fm.hue,fm.sat,fm.bri,curAlp); break;
      case 'spark': drawFly_spark(fm.x,fm.y,ang,curSz,fm.hue,fm.sat,fm.bri,curAlp); break;
      case 'curl':  drawFly_curl (fm.x,fm.y,ang,curSz,fm.hue,fm.sat,fm.bri,curAlp); break;
      default:      drawFly_dot  (fm.x,fm.y,ang,curSz,fm.hue,fm.sat,fm.bri,curAlp); break;
    }
  }

  function stepFlowMarks(speedScale, topoStrength, topoContrast, ft){
    if(topoStrength<0.05) return;
    for(var fi=0;fi<flowMarks.length;fi++){
      var fm=flowMarks[fi];
      if(!fm.active) continue;

      var flow=getContourFlow(fm.x,fm.y);
      var nAng=noise(fm.x/240+fm.ns,fm.y/240+fm.ns*0.7,ft*0.0005)*Math.PI*0.65;
      var dx=(flow.vx*fm.spd+Math.cos(nAng)*0.40)*speedScale;
      var dy=(flow.vy*fm.spd+Math.sin(nAng)*0.40)*speedScale;
      fm.x+=dx; fm.y+=dy;
      fm.x=((fm.x%SIZE)+SIZE)%SIZE;
      fm.y=((fm.y%SIZE)+SIZE)%SIZE;

      // Travel angle — used by regular fly shapes for orientation
      var travelAng = Math.atan2(dy, dx);

      var slowPulse  =noise(fm.nsFlicker,     ft*fm.flickerSpd);
      var fastShimmer=noise(fm.nsFlicker*3.1, ft*fm.flickerSpd*4.5);
      var pulse=Math.pow(lerp(slowPulse,fastShimmer,0.28),1.6);
      var curAlp=fm.alpBase+fm.alpRange*pulse;
      var curSz =fm.szBase +fm.szRange *pulse;

      if(fm.isFirefly){
        // Three-layer glow
        strokeWeight(curSz*2.8);
        stroke(hmod(fm.hue),fm.sat*0.5,fm.bri,curAlp*0.14);
        point(fm.x,fm.y);
        strokeWeight(curSz*1.6);
        stroke(hmod(fm.hue),fm.sat*0.75,fm.bri,curAlp*0.28);
        point(fm.x,fm.y);
        strokeWeight(curSz);
        stroke(hmod(fm.hue),fm.sat,fm.bri,curAlp);
        point(fm.x,fm.y);
      } else {
        // Shape-based regular fly, oriented to travel direction
        drawRegularFly(fm, curAlp, curSz, travelAng);
      }
    }
  }

  function populateWinterData(rng,drift,sm,ahs,winterMult){
    var winterStrength=clamp((0.80-sm)/0.70,0,1);
    if(winterStrength<0.02&&winterMult<1.05) return;
    var ws=clamp(winterStrength*winterMult,0,1.0);
    var t1h=TYPE_HUES[TYPE1_NAME]||[90,110,130],t2h=TYPE_HUES[TYPE2_NAME]||[270,290,310];
    var extCount=Math.floor(lerp(0,560,ws)*lerp(0.7,1.0,rng())*winterMult);
    var intCount=Math.floor(lerp(0,240,ws)*lerp(0.6,1.0,rng())*winterMult);
    var baseAlp=lerp(28,70,ws), baseSize=lerp(4.0,14.0,rng());
    for(var i=0;i<extCount;i++){
      var idx=Math.floor(rng()*edgePixels.length),ep=edgePixels[idx],th=thickness[idx];
      var outAng=normals[idx],dist=lerp(3,22,rng())*lerp(0.4,1.0,th);
      var px=clamp(ep[0]+Math.cos(outAng)*dist,1,SIZE-2),py=clamp(ep[1]+Math.sin(outAng)*dist,1,SIZE-2);
      var hue=hmod(lerp(t1h[0],t1h[2],rng())+ahs+(rng()-0.5)*18);
      var sz=baseSize*lerp(0.45,1.8,rng())*lerp(0.35,1.0,th);
      winterData.push({type:TYPE1_NAME,x:px,y:py,ang:normals[idx]+(rng()-0.5)*lerp(0.28,0.85,drift),sz:sz,h:hue,s:lerp(20,50,drift),b:lerp(22,55,rng()),a:baseAlp*lerp(0.45,1.0,rng()),ns:rng()*800});
    }
    for(var j=0;j<intCount;j++){
      var idx2=Math.floor(rng()*edgePixels.length),ep2=edgePixels[idx2],th2=thickness[idx2];
      var inAng=normals[idx2]+Math.PI,dist2=lerp(2,16,rng())*lerp(0.25,1.0,th2);
      var px2=clamp(ep2[0]+Math.cos(inAng)*dist2,1,SIZE-2),py2=clamp(ep2[1]+Math.sin(inAng)*dist2,1,SIZE-2);
      var hue2=hmod(lerp(t2h[0],t2h[2],rng())+ahs+(rng()-0.5)*18);
      var sz2=baseSize*lerp(0.32,1.4,rng())*lerp(0.25,1.0,th2);
      winterData.push({type:TYPE2_NAME,x:px2,y:py2,ang:inAng+(rng()-0.5)*lerp(0.25,0.78,drift),sz:sz2,h:hue2,s:lerp(16,42,drift),b:lerp(18,46,rng()),a:baseAlp*lerp(0.35,0.88,rng()),ns:rng()*800});
    }
  }


  // ── Animation state ──────────────────────────────────
  // bgImage: static p5.Image of the bg layer, redrawn under leaves each frame.
  // leafData / winterData: arrays of element params, redrawn each frame with sway.
  // Flow marks drift along topo contour lines between bg and leaves.

  var bgImage   = null;
  var leafData  = [];
  var winterData= [];
  var built     = false;
  var frameT    = 0;

  // Per-type sway amplitude (radians). Heavier types barely move.
  var TYPE_SWAY = {
    grass:0.52, bug:0.16, poison:0.38, ghost:0.65, fire:0.32,
    electric:0.28, water:0.12, ice:0.18, flying:0.58, ground:0.06,
    rock:0.06, fighting:0.12, normal:0.42, psychic:0.36, dragon:0.22
  };

  function swayAmt(typeName){ return TYPE_SWAY[typeName]||0.08; }

  // Animate one frame — called by draw()
  function animateFrame(){
    if(!built) return;

    var sl = getSliders();
    var drift = getDrift();
    var _bugCounts=getBugCounts(getHours());
    if(_bugCounts.ff!==_fireflyActive||_bugCounts.reg!==_regularActive){
      _fireflyActive=_bugCounts.ff; _regularActive=_bugCounts.reg;
      _applyBugGate(_bugCounts);
    }
    // Motion scale: midnight=nearly still, noon=full sway
    var speedScale = lerp(0.35, 1.0, drift);
    var swayScale  = lerp(0.35, 1.0, drift);
    var ft = frameT * 0.025;   // was 0.006 — 4× faster noise advance

    // Restore static background
    image(bgImage, 0, 0);

    // Topo flow marks — between bg and leaves
    if(sl.topo > 0.05){
      // Flow marks get their own floor so they move even at midnight
      stepFlowMarks(Math.max(speedScale, 0.40), sl.topo, sl.topoContrast, frameT);
    }

    // Leaves with world-coherent sway
    // _seededDraw fixes Math.random inside draw fns → stable stipple, no flicker
    for(var li=0; li<leafData.length; li++){
      var ld = leafData[li];
      var amp    = swayAmt(ld.type) * swayScale;
      var leafN  = (noise(ld.ns,       ld.ns*0.6,  ft)     * 2 - 1) * amp;
      var worldN = (noise(ld.x/200,    ld.y/200,   ft*0.7) * 2 - 1) * amp * 0.35;
      var swayAng = ld.ang + leafN + worldN;
      (function(leaf, ang){
        _seededDraw(leaf.ns, function(){
          drawTypedLeaf(leaf.type, leaf.x, leaf.y, ang,
                        leaf.len, leaf.wid, leaf.wt, leaf.h, leaf.s, leaf.b, leaf.a);
        });
      })(ld, swayAng);
    }

    // Winter shapes with sway
    for(var wi=0; wi<winterData.length; wi++){
      var wd = winterData[wi];
      var wamp   = swayAmt(wd.type) * swayScale * 0.75;
      var wN     = (noise(wd.ns*1.1, wd.ns*0.7, ft*0.9) * 2 - 1) * wamp;
      var wwN    = (noise(wd.x/200,  wd.y/200,  ft*0.7) * 2 - 1) * wamp * 0.35;
      var wSwayAng = wd.ang + wN + wwN;
      (function(w, ang){
        _seededDraw(w.ns, function(){
          drawAmbientShape(w.type, w.x, w.y, ang, w.sz, w.h, w.s, w.b, w.a);
        });
      })(wd, wSwayAng);
    }

    frameT++;
    // Update firefly counter display every 30 frames
    if(frameT % 30 === 0){
      var el=document.getElementById('fireflyCount');
      if(el) el.textContent='fireflies: '+_fireflyActive+' · flies: '+_regularActive+' · total: '+(_fireflyActive+_regularActive)+' / '+BUG_MAX;
    }
  }



  var isBuilding=false;
  function getHours(){
    var d=_now();
    return d.getHours()+d.getMinutes()/60+d.getSeconds()/3600;
  }
  function getActiveDate(){ return _now(); }
  function getAnnualData(){
    var d=_now();
    var doy=Math.floor((d-new Date(d.getFullYear(),0,0))/86400000),phase=doy/365;
    return{
      doy:doy, phase:phase,
      seasonMult:clamp(0.45+0.55*(-Math.cos(2*Math.PI*phase)),0.1,1.0),
      annualHueShift:Math.sin(2*Math.PI*phase)*55
    };
  }
  function getDrift(){
    var d=_now();
    var doy=Math.floor((d-new Date(d.getFullYear(),0,0))/86400000);
    var shift=Math.sin((2*Math.PI*doy)/365)*4;
    return Math.max(0,Math.sin(Math.PI*(getHours()-shift)/24)*0.92);
  }
  function getTypeBlend(h){ return((1-Math.cos(2*Math.PI*h/24))/2)*0.85; }
  var NM0=Date.UTC(2025,0,29,12,36,0), LC=29.53058867*86400000;
  function getMoon(){
    var d=_now(),el=((d.getTime()-NM0)%LC+LC)%LC,ph=el/LC;
    return{factor:(1-Math.cos(2*Math.PI*ph))/2};
  }

  var occupied=null, edgePixels=[], normals=[], thickness=[];
  function buildMask(imgData){
    occupied=new Uint8Array(SIZE*SIZE);
    for(var i=0;i<SIZE*SIZE;i++) occupied[i]=imgData[i*4+3]>10?1:0;
    edgePixels=[]; normals=[]; thickness=[];
    var MC=120;
    for(var y=1;y<SIZE-1;y++){ for(var x=1;x<SIZE-1;x++){
      if(!occupied[y*SIZE+x]) continue;
      var isEdge=!occupied[(y-1)*SIZE+x]||!occupied[(y+1)*SIZE+x]
               ||!occupied[y*SIZE+(x-1)]||!occupied[y*SIZE+(x+1)];
      if(!isEdge) continue;
      var gx2=-(occupied[clamp(y-1,0,SIZE-1)*SIZE+clamp(x-1,0,SIZE-1)])
             -2*(occupied[clamp(y,0,SIZE-1)*SIZE+clamp(x-1,0,SIZE-1)])
             -(occupied[clamp(y+1,0,SIZE-1)*SIZE+clamp(x-1,0,SIZE-1)])
             +(occupied[clamp(y-1,0,SIZE-1)*SIZE+clamp(x+1,0,SIZE-1)])
             +2*(occupied[clamp(y,0,SIZE-1)*SIZE+clamp(x+1,0,SIZE-1)])
             +(occupied[clamp(y+1,0,SIZE-1)*SIZE+clamp(x+1,0,SIZE-1)]);
      var gy2=-(occupied[clamp(y-1,0,SIZE-1)*SIZE+clamp(x-1,0,SIZE-1)])
             -2*(occupied[clamp(y-1,0,SIZE-1)*SIZE+clamp(x,0,SIZE-1)])
             -(occupied[clamp(y-1,0,SIZE-1)*SIZE+clamp(x+1,0,SIZE-1)])
             +(occupied[clamp(y+1,0,SIZE-1)*SIZE+clamp(x-1,0,SIZE-1)])
             +2*(occupied[clamp(y+1,0,SIZE-1)*SIZE+clamp(x,0,SIZE-1)])
             +(occupied[clamp(y+1,0,SIZE-1)*SIZE+clamp(x+1,0,SIZE-1)]);
      var ang=Math.atan2(gy2,gx2)+Math.PI;
      var inAng=ang+Math.PI, dx2=Math.cos(inAng), dy2=Math.sin(inAng), depth=0;
      for(var step=1;step<=MC;step++){
        var rx=Math.round(x+dx2*step), ry=Math.round(y+dy2*step);
        if(rx<0||rx>=SIZE||ry<0||ry>=SIZE) break;
        if(!occupied[ry*SIZE+rx]) break;
        depth=step;
      }
      edgePixels.push([x,y]); normals.push(ang);
      thickness.push(clamp(depth/60,0.08,1.0));
    }}
  }

  function rasterizeSVG(cb){
    var mc=document.createElement("canvas"); mc.width=mc.height=SIZE;
    var mx=mc.getContext("2d"); mx.clearRect(0,0,SIZE,SIZE);
    var ds=SVG_SIZE*svgScale, dx=svgCX-ds/2, dy=svgCY-ds/2;
    mx.drawImage(svgImg,dx,dy,ds,ds);
    cb(mx.getImageData(0,0,SIZE,SIZE).data);
  }

  async function buildPiece(){
    if(isBuilding) return;
    isBuilding=true; built=false;
    leafData=[]; winterData=[];
    var sl=getSliders();
    var seed=hashName(currentName), rng=mulberry32(seed);
    var drift=getDrift(), hours=getHours(), tb=getTypeBlend(hours);
    var moon=getMoon(), mf=moon.factor;
    var annual=getAnnualData(), sm=annual.seasonMult, ahs=annual.annualHueShift, d=drift;
    var leafMult=sl.leafMult, sizeMult=sl.leafSize;
    buildTopoMap(rng,sl.topoScale);
    buildTopoGradient();
    background(0,0,8);
    await drawTopoBackground(rng,d,tb,ahs,sl.topo,sl.topoContrast);
    bgImage=get(0,0,SIZE,SIZE);
    initFlowMarks(drift);
    var leafHueBase  =hmod(blendTypeHue(tb*0.4,rng)+ahs+d*18);
    var leafSatBase  =lerp(52,88,d),  leafBriBase=lerp(35,70,rng()), leafAlpBase=lerp(60,95,rng());
    var leafLenBase  =lerp(22,70,rng())*lerp(0.55,1.0,sm)*sizeMult;
    var leafWidBase  =lerp(8,26,rng())*lerp(0.60,1.0,sm)*sizeMult;
    var leafWtBase   =lerp(1.0,2.2,rng());
    var leafCount    =Math.floor(lerp(50,180,mf)*sm*leafMult);
    var innerHueBase =hmod(blendTypeHue(1.0-tb*0.4,rng)+ahs+d*12);
    var innerSatBase =lerp(30,65,d),  innerBriBase=lerp(18,48,rng()), innerAlpBase=lerp(45,78,rng());
    var innerLenBase =lerp(10,34,rng())*lerp(0.55,1.0,sm)*sizeMult;
    var innerWidBase =lerp(4,16,rng())*lerp(0.60,1.0,sm)*sizeMult;
    var innerWtBase  =lerp(0.8,2.0,rng());
    var innerCount   =Math.floor(lerp(20,80,mf)*sm*leafMult);
    if(edgePixels.length>0){
      for(var li=0;li<leafCount;li++){
        var ei=Math.floor((li/leafCount)*edgePixels.length);
        var ep=edgePixels[ei], th=thickness[ei];
        var angle=normals[ei]+(rng()-0.5)*lerp(0.2,0.8,d);
        leafData.push({type:TYPE1_NAME,x:ep[0],y:ep[1],ang:angle,
          len:leafLenBase*lerp(0.45,1.55,rng())*lerp(0.30,1.0,th),
          wid:leafWidBase*lerp(0.40,1.60,rng())*lerp(0.25,1.0,th),
          wt:leafWtBase*lerp(0.6,1.4,rng())*lerp(0.5,1.0,th),
          h:hmod(leafHueBase+(rng()-0.5)*22),
          s:clamp(leafSatBase+(rng()-0.5)*22,0,100),
          b:clamp(leafBriBase+(rng()-0.5)*28,0,100),
          a:clamp(leafAlpBase+(rng()-0.5)*20,0,100),
          ns:rng()*800});
      }
      for(var li2=0;li2<innerCount;li2++){
        var ei2=Math.floor((li2/innerCount)*edgePixels.length);
        var ep2=edgePixels[ei2], th2=thickness[ei2];
        var angle2=normals[ei2]+Math.PI+(rng()-0.5)*lerp(0.2,0.7,d);
        leafData.push({type:TYPE2_NAME,x:ep2[0],y:ep2[1],ang:angle2,
          len:innerLenBase*lerp(0.45,1.65,rng())*lerp(0.25,1.0,th2),
          wid:innerWidBase*lerp(0.45,1.65,rng())*lerp(0.25,1.0,th2),
          wt:innerWtBase*lerp(0.6,1.4,rng())*lerp(0.4,1.0,th2),
          h:hmod(innerHueBase+(rng()-0.5)*22),
          s:clamp(innerSatBase+(rng()-0.5)*20,0,100),
          b:clamp(innerBriBase+(rng()-0.5)*22,0,100),
          a:clamp(innerAlpBase+(rng()-0.5)*20,0,100),
          ns:rng()*800});
      }
      populateWinterData(rng,drift,sm,ahs,sl.winterMult);
    }
    frameT=0; built=true; isBuilding=false;
  }

  function onCanvasClick(evt){
    if(isBuilding) return;
    var rect=evt.target.getBoundingClientRect();
    svgCX=(evt.clientX-rect.left)*(SIZE/rect.width);
    svgCY=(evt.clientY-rect.top)*(SIZE/rect.height);
    svgScale=lerp(0.55,1.65,Math.random());
    randomizeParams();
    rasterizeSVG(function(d){ buildMask(d); buildPiece(); });
  }
  function onCanvasScroll(evt){
    if(isBuilding) return;
    evt.preventDefault();
    svgScale=clamp(svgScale+(evt.deltaY>0?-0.08:0.08),0.25,3.0);
    rasterizeSVG(function(d){ buildMask(d); buildPiece(); });
  }

  function setStatus(msg){ document.getElementById("status").textContent=msg; }

  function reportHeight(){
    window.parent.postMessage({ pokedexHeight: document.getElementById("wrap").scrollHeight + 32 }, "*");
  }

  function loadPokemon(d){
    var row=dateToPokemon(d);
    var num=row[0], name=row[1], t1=row[2], t2=row[3]||row[2];
    currentNum=num; currentName=name;
    TYPE1_NAME=t1; TYPE2_NAME=t2;
    POKEDEX_NUM=num; POKEDEX_HUE=Math.round((num/151)*360);
    var pad3=String(num).padStart(3,"0");
    var title=pad3+" "+name.replace("_"," ");
    var typeStr=t2&&t2!==t1?t1+" / "+t2:t1;
    document.getElementById("title").textContent=title.toUpperCase();
    document.getElementById("subtitle").textContent=typeStr;
    var url=REPO+pad3+"_"+name+".svg";
    setStatus("loading...");
    fetch(url)
      .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.text(); })
      .then(function(svgText){
        var b64=btoa(unescape(encodeURIComponent(svgText)));
        svgImg=new Image();
        svgImg.onload=function(){
          svgCX=SIZE/2; svgCY=SIZE/2; svgScale=1.0;
          randomizeParams();
          rasterizeSVG(function(px){ buildMask(px); buildPiece(); });
        };
        svgImg.src="data:image/svg+xml;base64,"+b64;
        setStatus("Yo! Champ in the making! Click date and time to adjust.");
        reportHeight();
      })
      .catch(function(e){ setStatus("error: "+e.message); });
  }

  function onPickerChange(){
    var d=inputsToDate();
    if(isNaN(d.getTime())) return;
    _mockDate=d;
    var h=d.getHours(), m=d.getMinutes(), s=d.getSeconds();
    var ampm=h<12?"am":"pm", h12=h%12||12;
    var months=["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
    var el=document.getElementById("clock");
    if(el) el.textContent=months[d.getMonth()]+" "+d.getDate()+" "+d.getFullYear()
                          +" · "+h12+":"+pad(m)+":"+pad(s)+" "+ampm;
    loadPokemon(d);
  }

  document.getElementById("pickerDate").addEventListener("change", onPickerChange);
  document.getElementById("pickerTime").addEventListener("change", onPickerChange);

  function setup(){
    var cnv=createCanvas(SIZE,SIZE);
    colorMode(HSB,360,100,100,100);
    frameRate(22);
    background(0,0,8);
    cnv.elt.addEventListener("click",onCanvasClick);
    cnv.elt.addEventListener("wheel",onCanvasScroll,{passive:false});
    document.getElementById("canvasWrap").appendChild(cnv.elt);
    var now=new Date();
    dateToInputs(now);
    loadPokemon(now);
    window.addEventListener("resize", reportHeight);
    tickClock();
  }
  function draw(){ animateFrame(); }
  </script>
</body>
</html>
